<!DOCTYPE html>
<html>
<head>
  <title>Arx Index Lite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Arx Finder Lite</h1>
<p>Lightweight document indexing and retrieval platform.</p>

<div class="card">
  <h2>Add Document</h2>

  <input id="name" placeholder="Document Name">
  <input id="category" placeholder="Category">
  <input id="description" placeholder="Description">

  <button onclick="addDocument()">Save</button>
</div>

<div class="card">
  <h2>Search</h2>

  <input id="search" placeholder="Search documents">
  <button onclick="searchDocuments()">Search</button>

  <div id="results"></div>
</div>

<footer>
  Arx Labz 2026
</footer>

<script src="app.js"></script>

</body>
</html>
